<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWNER PANEL - DENZX</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: sans-serif; padding: 15px; }
        .header { border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 5px #00ff41; }
        .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: #000; border-left: 3px solid #ff0000; padding: 10px; font-size: 0.8rem; }
        .stat-label { color: #555; font-size: 0.6rem; text-transform: uppercase; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 93%; padding: 10px; background: #000; border: 1px solid #333; color: #00ff41; margin-top: 5px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header">BOT DENZX v5.0 - ONLINE</div>

    <div class="card">
        <div class="stat-label">Connect to Target</div>
        <input type="text" placeholder="ENTER 6-DIGIT CODE">
        <button class="btn" style="background: #00ff41; color: #000;">SYNC DEVICE</button>
    </div>

    <div class="card">
        <div style="color: #ff0000; font-weight: bold; margin-bottom: 10px;">TARGET STATUS: CONNECTED</div>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">Model</div>
                <div>Oppo F7</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Battery</div>
                <div style="color: #ff0000;">87%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Network</div>
                <div>4G / WiFi</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">System</div>
                <div style="color: #00ff41;">READY</div>
            </div>
        </div>
    </div>

    <div class="card">
        <button class="btn" style="background: #ff0000; color: #fff;">LOCK DEVICE</button>
        <button class="btn" style="background: #333; color: #fff;">UNLOCK DEVICE</button>
    </div>

</body>
</html>
